redis:
  url: ${oc.env:AGENT_REDIS_URL,redis://localhost:6379/0}

runtime:
  store: ${oc.env:AGENT_RUNTIME_STORE,memory}
  ttl_seconds: 3600
  event_maxlen: 1000

auth:
  user:
    mode: noop
  internal:
    mode: ${oc.env:AGENT_INTERNAL_AUTH_MODE,noop}
    secret: ${oc.env:AGENT_INTERNAL_AUTH_SECRET,""}

files:
  local_root: .data/files

logging:
  level: INFO
  format: json

timeouts:
  run_seconds: 600
  business_task_seconds: 300
  bridge_action_seconds: 30
  llm_call_seconds: 60
