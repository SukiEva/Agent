redis:
  url: redis://localhost:6379/0

runtime:
  store: memory
  ttl_seconds: 3600
  event_maxlen: 1000

auth:
  user:
    mode: noop
  internal:
    mode: noop

files:
  local_root: .data/files

logging:
  level: INFO
  format: json

timeouts:
  run_seconds: 600
  business_task_seconds: 300
  bridge_action_seconds: 30
  llm_call_seconds: 60
