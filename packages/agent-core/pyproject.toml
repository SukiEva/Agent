[project]
name = "agent-core"
version = "0.1.0"
description = "Shared SDK for the agent system."
requires-python = ">=3.11"
dependencies = [
  "fasta2a",
  "omegaconf>=2.3.0",
  "pydantic>=2.0",
  "redis>=5.0",
  "structlog>=24.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/agent_core"]
